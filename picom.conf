# Backend e composição
backend = "glx";
vsync = true;
use-damage = true;

# Opacidade apenas para o terminal (alacritty)
# opacity-rule = [
#   # "100:class_g = 'i3lock'",
#   # "90:class_g = 'Alacritty'"
# ];

# Sombra para todas as janelas
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.5;
shadow-exclude = [
  "argb"
];

# Blur/efeitos (opcional - comentado se não quiser)
# blur-background = true;
# blur-background-frame = false;
# blur-method = "gaussian";
# blur-strength = 5;

# Fading (transição suave)
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Melhorias de performance
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-transient = true;
