- default:
    link:
        relink: true
        create: true 
        force: true
    shell: 
        quiet: true
- shell:
    - description: Validating sudo credentials
      command: "sudo --validate"
- clean: ['~']
- link:
    ~/.gitconfig: 
    ~/.Xresources2: 
    ~/.vim: 
    ~/.vimrc: 
    ~/.zshrc: 
    ~/.config: 
- create:
    - ~/.vim/undo-history
    - ~/.vim/fzf_history


