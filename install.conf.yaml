- default:
    link:
        relink: true
        create: true 
        force: true
    shell: 
        quiet: true
- shell:
    - description: Validating sudo credentials
      command: "sudo --validate"
- clean: ['~']
- link:
    ~/.Xresources2: Xresources2 
    ~/.vim: vim
    ~/.vimrc: 
        path: vimrc
    ~/.zshrc:
        force: true
        path: zshrc 
    ~/.config: 
        path: config
- create:
    - ~/.vim/undo-history
    - ~/.vim/fzf_history

- shell:
    - apt install cmake
    - apt install python3
    - python3 ~/.vim/plugged/YouCompleteMe/install.py # To install YouCompleteMe plugin correctly (requires python3 and cmake)
    
