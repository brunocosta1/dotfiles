- default:
    link:
        relink: true
        create: true 
        force: true
    shell: 
        quiet: true
- shell:
    - description: Validating sudo credentials
      command: "sudo --validate"
- clean: ['~']
- link:
    ~/.vim: vim
    ~/.vimrc: 
        path: vimrc
    ~/.zshrc:
        force: true
        path: zshrc 
    ~/.config: 
        path: config
- create:
    - ~/.vim/undo-history
    - ~/.vim/fzf_history

- shell:
    - description: Install Curl
      command: "sudo apt install curl"
    
    - description: Install vim-plug
      command: "curl -fLo ~/.vim/autoload/plug.vim --create-dirs \
    https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim"

    - description: Install vim plugins
      command: "vim +PlugInstall +qa"
    - description: Install cmake
      command: "sudo apt install cmake"
    - description: Install python3
      command: "sudo apt install python3"
    - description: Install YouCompleteMe vim plugin 
      command: "python3 ~/.vim/plugged/YouCompleteMe/install.py" # To install YouCompleteMe plugin correctly (requires python3 and cmake)
