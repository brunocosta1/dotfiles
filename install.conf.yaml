- default:
    link:
        relink: true
        create: true 
        force: true
    shell: 
        quiet: true
- shell:
    - description: Validating sudo credentials
      command: "sudo --validate"
- clean: ['~']
- link:
    ~/.Xresources2: Xresources2 
    ~/.vim: vim
    ~/.vimrc: 
        path: vimrc
    ~/.zshrc:
        force: true
        path: zshrc 
    ~/.config: 
        path: config
- create:
    - ~/.vim/undo-history
    - ~/.vim/fzf_history


