- default:
    link:
        relink: true
        create: true 
        force: true
    shell: 
        quiet: true
- shell:
    - description: Validating sudo credentials
      command: "sudo --validate"
- clean: ['~']
- link:
    ~/.gitconfig: git/config
    ~/.Xresources2: 
    ~/.vim: 
    ~/.vimrc: vim/vimrc
    ~/.zshrc: zsh/zshrc
    ~/.config: config
- create:
    - ~/.vim/undo-history
    - ~/.vim/fzf_history


